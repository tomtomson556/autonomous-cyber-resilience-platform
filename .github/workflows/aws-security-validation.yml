name: AWS S3 Security Validation

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate-s3-security:
    name: Validate S3 Security Controls
    runs-on: ubuntu-latest

    env:
      AWS_DEFAULT_REGION: eu-central-1
      BUCKET_NAME: cyber-resilience-objectlock-lab-tom-2026

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure AWS credentials through OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::061650022648:role/GitHubActionsS3ValidatorRole
          role-session-name: s3-security-validation-${{ github.run_id }}
          aws-region: eu-central-1
          allowed-account-ids: 061650022648
          role-duration-seconds: 900

      - name: Run S3 security validator
        run: python src/tools/aws_s3_security.py

      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: s3-security-report
          path: reports/s3_security_report.json
          if-no-files-found: warn
